name: Deploy app versions to GitHub Pages

on:
  push:
    branches:
      - master
      - design-proposal-1
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current app branch
        uses: actions/checkout@v6
        with:
          ref: master
          path: current

      - name: Checkout design proposal branch
        uses: actions/checkout@v6
        with:
          ref: design-proposal-1
          path: proposal

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies for current app
        working-directory: current
        run: pnpm install --frozen-lockfile

      - name: Generate data for current app
        working-directory: current
        run: pnpm generate:data

      - name: Build current app
        working-directory: current
        run: VITE_BASE="/my-project-name/" pnpm build

      - name: Install dependencies for design proposal
        working-directory: proposal
        run: pnpm install --frozen-lockfile

      - name: Generate data for design proposal
        working-directory: proposal
        run: pnpm generate:data

      - name: Build design proposal
        working-directory: proposal
        run: VITE_BASE="/my-project-name/design-proposal-1/" pnpm build

      - name: Combine both builds into one Pages site
        run: |
          mkdir -p published-site/design-proposal-1

          cp -a current/dist/. published-site/
          cp -a proposal/dist/. published-site/design-proposal-1/

          touch published-site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: published-site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4